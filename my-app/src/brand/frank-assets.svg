  FRANK. — Brand Assets
  AI Deal Partner · frank.ai · New York
  Version 1.0 · Confidential

  CONTENTS
  01 — Stamp mark · Full · On paper (220×220)
  02 — Stamp mark · Full · On tobacco (220×220)
  03 — Wordmark · Horizontal · Light
  04 — Wordmark · Horizontal · Dark
  05 — Stamp · Compact 80px · Dark
  06 — Stamp · Compact 40px · Dark
  07 — Favicon 24px · Dark
  08 — Stamp watermark · Ghost (for memo backgrounds)
  09 — Stamp row component (stamped analysis footer)
  COLOR TOKENS
  --frank-tobacco:    #1A1410  Primary dark surface
  --frank-espresso:   #2C2218  Card on dark
  --frank-linen:      #EDE0CC  Text on dark / light surface
  --frank-paper-lt:   #FAF3E8  Marketing background
  --frank-oxblood:    #8B2E22  Stamp / period / pushback
  --frank-oxblood-lt: #A83828  Oxblood on dark
  --frank-amber-lt:   #D9962E  High-value data on dark
  --frank-dust:       #9C8878  Labels / metadata
  --frank-press:      #C8B8A8  Dividers

  STAMP USAGE RULES
  The stamp appears ONLY on completed deal analyses.
  Never decoratively. Never in marketing.
  The stamp is accountability — Frank's license on the deal.
  Minimum stamp size: 36px rendered diameter.
  At <40px: use compact variant (05/06). At <24px: use favicon (07).
-->

